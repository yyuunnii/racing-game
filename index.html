<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>方块赛车</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        
        h1 {
            color: #00d4ff;
            text-shadow: 0 0 20px #00d4ff;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        #gameCanvas {
            border: 3px solid #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            background: #0a0a0a;
        }
        
        #score {
            color: #fff;
            font-size: 18px;
            margin: 10px 0;
        }
        
        #score span {
            color: #00ff88;
            font-weight: bold;
        }
        
        /* 控制按钮区域 */
        #controls {
            display: flex;
            gap: 30px;
            margin-top: 15px;
        }
        
        .control-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #00d4ff;
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            font-size: 30px;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .control-btn:active {
            background: rgba(0, 212, 255, 0.5);
            transform: scale(0.95);
            box-shadow: 0 0 20px #00d4ff;
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        #gameOverScreen {
            display: none;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
        
        .instructions {
            color: #aaa;
            margin-top: 15px;
            text-align: center;
            line-height: 1.6;
        }
        
        .final-score {
            color: #00ff88;
            font-size: 24px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🏎️ 方块赛车</h1>
    <div id="score">得分: <span id="scoreValue">0</span></div>
    <canvas id="gameCanvas" width="300" height="500"></canvas>
    
    <!-- AI 模式开关 -->
    <div id="aiMode" style="margin: 10px 0;">
        <label style="color: #00ff88; cursor: pointer; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="aiToggle" style="width: 18px; height: 18px; cursor: pointer;">
            <span>🤖 AI 自动驾驶模式（看戏模式）</span>
        </label>
    </div>
    
    <!-- 左右控制按钮 -->
    <div id="controls">
        <button class="control-btn" id="leftBtn">◀</button>
        <button class="control-btn" id="rightBtn">▶</button>
    </div>
    
    <div id="startScreen">
        <h1 style="font-size: 36px;">🏎️ 方块赛车</h1>
        <p class="instructions">
            使用 ← → 方向键或点击按钮控制<br>
            躲避障碍物，坚持越久得分越高！<br>
            <span style="color: #00ff88;">🤖 开启 AI 模式，看 AI 自己玩！</span>
        </p>
        <button class="btn" onclick="startGame()">开始游戏</button>
    </div>
    
    <div id="gameOverScreen">
        <h1 style="color: #ff4444;">游戏结束</h1>
        <p class="final-score">最终得分: <span id="finalScore">0</span></p>
        <button class="btn" onclick="restartGame()">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreValue');
        const finalScoreElement = document.getElementById('finalScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const aiToggle = document.getElementById('aiToggle');
        
        // 游戏配置
        const GRID_SIZE = 25;
        const COLS = 12;
        const ROWS = 20;
        
        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let speed = 3;
        let frameCount = 0;
        let aiMode = false; // AI 自动驾驶模式
        
        // 玩家赛车
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 100,
            width: 40,
            height: 60,
            lane: 1, // 0=左, 1=中, 2=右
            targetX: canvas.width / 2 - 20
        };
        
        // 障碍物
        let obstacles = [];
        
        // 道路线条
        let roadLines = [];
        for (let i = 0; i < 5; i++) {
            roadLines.push({ y: i * 120 });
        }
        
        // 粒子效果
        let particles = [];
        
        // AI 模式开关
        aiToggle.addEventListener('change', (e) => {
            aiMode = e.target.checked;
            if (aiMode && gameRunning) {
                // 隐藏控制按钮
                document.getElementById('controls').style.opacity = '0.3';
                document.getElementById('controls').style.pointerEvents = 'none';
            } else {
                document.getElementById('controls').style.opacity = '1';
                document.getElementById('controls').style.pointerEvents = 'auto';
            }
        });

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || aiMode) return;
            
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                moveLeft();
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                moveRight();
            }
        });
        
        // 按钮控制 - 触摸和鼠标
        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if (gameRunning && !aiMode) moveLeft(); });
        leftBtn.addEventListener('mousedown', (e) => { e.preventDefault(); if (gameRunning && !aiMode) moveLeft(); });
        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if (gameRunning && !aiMode) moveRight(); });
        rightBtn.addEventListener('mousedown', (e) => { e.preventDefault(); if (gameRunning && !aiMode) moveRight(); });
        
        function moveLeft() {
            if (player.lane > 0) {
                player.lane--;
                updatePlayerTarget();
                createMoveParticles();
            }
        }
        
        function moveRight() {
            if (player.lane < 2) {
                player.lane++;
                updatePlayerTarget();
                createMoveParticles();
            }
        }
        
        function updatePlayerTarget() {
            const laneWidth = canvas.width / 3;
            player.targetX = player.lane * laneWidth + laneWidth / 2 - player.width / 2;
        }
        
        function createMoveParticles() {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: player.x + player.width / 2 + (Math.random() - 0.5) * 20,
                    y: player.y + player.height,
                    vx: (Math.random() - 0.5) * 4,
                    vy: Math.random() * 3 + 2,
                    life: 20,
                    color: `hsl(${Math.random() * 60 + 180}, 100%, 50%)`
                });
            }
        }

        // AI 自动驾驶逻辑
        function aiAutoDrive() {
            if (!aiMode || !gameRunning) return;

            const laneWidth = canvas.width / 3;
            const playerLaneX = player.lane * laneWidth + laneWidth / 2;
            const dangerDistance = 200; // 前方危险距离
            const safeDistance = 350;   // 安全距离

            // 找出每个车道最近的障碍物
            const laneObstacles = [[], [], []]; // 左、中、右车道的障碍物
            
            for (let obs of obstacles) {
                const obsCenterX = obs.x + obs.width / 2;
                const obsLane = Math.floor(obsCenterX / laneWidth);
                if (obsLane >= 0 && obsLane <= 2) {
                    // 只关心玩家前方的障碍物
                    if (obs.y + obs.height > player.y - safeDistance && 
                        obs.y < player.y + player.height + dangerDistance) {
                        laneObstacles[obsLane].push(obs);
                    }
                }
            }

            // 计算每个车道的危险程度
            const laneDanger = [0, 0, 0];
            
            for (let lane = 0; lane < 3; lane++) {
                for (let obs of laneObstacles[lane]) {
                    const distance = obs.y - (player.y + player.height);
                    
                    // 距离越近，危险程度越高
                    if (distance < dangerDistance && distance > -50) {
                        // 即将碰撞或正在碰撞区域
                        laneDanger[lane] += 1000;
                    } else if (distance < safeDistance) {
                        // 危险区域
                        laneDanger[lane] += (safeDistance - distance) / 10;
                    }
                }
            }

            // 当前车道危险度
            const currentLaneDanger = laneDanger[player.lane];
            
            // 如果当前车道有危险，寻找最安全的车道
            if (currentLaneDanger > 50) {
                let safestLane = player.lane;
                let minDanger = currentLaneDanger;

                // 检查左车道
                if (player.lane > 0 && laneDanger[player.lane - 1] < minDanger) {
                    safestLane = player.lane - 1;
                    minDanger = laneDanger[player.lane - 1];
                }
                // 检查右车道
                if (player.lane < 2 && laneDanger[player.lane + 1] < minDanger) {
                    safestLane = player.lane + 1;
                    minDanger = laneDanger[player.lane + 1];
                }

                // 切换到最安全的车道
                if (safestLane !== player.lane) {
                    if (safestLane < player.lane) {
                        moveLeft();
                    } else {
                        moveRight();
                    }
                }
            } else {
                // 当前车道安全，尝试回到中间车道（中间通常最灵活）
                if (player.lane !== 1 && laneDanger[1] < currentLaneDanger * 0.8) {
                    if (player.lane > 1) {
                        moveLeft();
                    } else {
                        moveRight();
                    }
                }
            }
        }
        
        function startGame() {
            startScreen.style.display = 'none';
            gameRunning = true;
            score = 0;
            speed = 3;
            obstacles = [];
            particles = [];
            player.lane = 1;
            updatePlayerTarget();
            player.x = player.targetX;
            
            // 根据 AI 模式调整控制按钮状态
            if (aiMode) {
                document.getElementById('controls').style.opacity = '0.3';
                document.getElementById('controls').style.pointerEvents = 'none';
            } else {
                document.getElementById('controls').style.opacity = '1';
                document.getElementById('controls').style.pointerEvents = 'auto';
            }
            
            gameLoop();
        }
        
        function restartGame() {
            gameOverScreen.style.display = 'none';
            startGame();
        }
        
        function gameOver() {
            gameRunning = false;
            finalScoreElement.textContent = score;
            gameOverScreen.style.display = 'flex';
        }
        
        function spawnObstacle() {
            const lane = Math.floor(Math.random() * 3);
            const laneWidth = canvas.width / 3;
            const obsWidth = 50;
            const obsHeight = 50;
            
            obstacles.push({
                x: lane * laneWidth + laneWidth / 2 - obsWidth / 2,
                y: -obsHeight,
                width: obsWidth,
                height: obsHeight,
                color: `hsl(${Math.random() * 60 + 300}, 100%, 50%)`,
                passed: false
            });
        }
        
        function update() {
            frameCount++;

            // AI 自动驾驶
            if (aiMode && frameCount % 5 === 0) {
                aiAutoDrive();
            }
            
            // 平滑移动玩家
            player.x += (player.targetX - player.x) * 0.3;
            
            // 更新道路线条
            for (let line of roadLines) {
                line.y += speed;
                if (line.y > canvas.height) {
                    line.y = -40;
                }
            }
            
            // 生成障碍物
            if (frameCount % Math.max(30, 60 - Math.floor(score / 50)) === 0) {
                spawnObstacle();
            }
            
            // 更新障碍物
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.y += speed;
                
                // 计分
                if (!obs.passed && obs.y > player.y + player.height) {
                    obs.passed = true;
                    score += 10;
                    scoreElement.textContent = score;
                    
                    // 逐渐加速
                    if (score % 100 === 0) {
                        speed += 0.5;
                    }
                }
                
                // 移除屏幕外的障碍物
                if (obs.y > canvas.height) {
                    obstacles.splice(i, 1);
                    continue;
                }
                
                // 碰撞检测
                if (player.x < obs.x + obs.width - 10 &&
                    player.x + player.width > obs.x + 10 &&
                    player.y < obs.y + obs.height - 10 &&
                    player.y + player.height > obs.y + 10) {
                    gameOver();
                }
            }
            
            // 更新粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }
        
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制道路分隔线
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            for (let i = 1; i < 3; i++) {
                const x = (canvas.width / 3) * i;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            // 绘制道路虚线
            ctx.strokeStyle = 'rgba(0, 212, 255, 0.3)';
            ctx.lineWidth = 3;
            ctx.setLineDash([30, 30]);
            for (let line of roadLines) {
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, line.y);
                ctx.lineTo(canvas.width / 2, line.y + 40);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            
            // 绘制障碍物
            for (let obs of obstacles) {
                // 发光效果
                ctx.shadowBlur = 15;
                ctx.shadowColor = obs.color;
                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                
                // 内部细节
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(obs.x + 5, obs.y + 5, obs.width - 10, 10);
                ctx.fillRect(obs.x + 5, obs.y + obs.height - 15, obs.width - 10, 10);
            }
            
            // 绘制玩家赛车
            ctx.shadowBlur = 20;
            ctx.shadowColor = aiMode ? '#00ff88' : '#00d4ff';
            
            // 车身
            ctx.fillStyle = aiMode ? '#00ff88' : '#00d4ff';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // 车窗
            ctx.fillStyle = '#003344';
            ctx.fillRect(player.x + 5, player.y + 10, player.width - 10, 20);
            
            // 车灯
            ctx.fillStyle = aiMode ? '#00ff88' : '#ffdd00';
            ctx.fillRect(player.x + 5, player.y + player.height - 10, 10, 5);
            ctx.fillRect(player.x + player.width - 15, player.y + player.height - 10, 10, 5);
            
            // AI 模式标识
            if (aiMode) {
                ctx.fillStyle = '#00ff88';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🤖 AI', player.x + player.width / 2, player.y - 10);
            }
            
            // 尾焰
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff6600';
            ctx.fillStyle = '#ff6600';
            for (let i = 0; i < 3; i++) {
                const flameY = player.y + player.height + i * 8;
                const flameW = player.width - i * 8;
                const flameX = player.x + (player.width - flameW) / 2;
                ctx.fillRect(flameX, flameY, flameW, 6);
            }
            
            ctx.shadowBlur = 0;
            
            // 绘制粒子
            for (let p of particles) {
                ctx.globalAlpha = p.life / 20;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
            }
            ctx.globalAlpha = 1;
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // 初始绘制
        draw();
    </script>
</body>
</html>
